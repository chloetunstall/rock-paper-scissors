<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
</head>
<body>
    <h1>Rock, Paper Scissors</h1>
    <p>After entering your five choices, right click on the page, select inspect, then click on the console button and see the results of the game!</p>
    <script>
        function getComputerChoice() {
            let randomNumber = Math.floor(Math.random() * 3) + 1;
            if (randomNumber === 1) {
                return "rock";
            } else if (randomNumber === 2) {
                return "paper";
            } else {
                return "scissors";
            }
        }

        function getHumanChoice() {
            return userInput = prompt("Rock, paper, or scissors?").toLowerCase().trim();
        }

        function playGame() {
            let humanScore = 0;
            let computerScore = 0;

            function playRound() {
                const humanChoice = getHumanChoice();
                const computerChoice = getComputerChoice();

                if (humanChoice === computerChoice) {
                    return `Tie! \nYour score: ${humanScore} \nComputer score: ${computerScore}`
                } else if (humanChoice === "rock" && computerChoice === "paper") {
                    ++computerScore
                    return `You lose! Paper beats rock \nYour score: ${humanScore} \nComputer score: ${computerScore}`;
                } else if (humanChoice === "rock" && computerChoice === "scissors") {
                    ++humanScore;
                    return `You win! Rock beats scissors \nYour score: ${humanScore} \nComputer score: ${computerScore}`;
                } else if (humanChoice === "paper" && computerChoice === "rock") {
                    ++humanScore;
                    return `You win! Paper beats rock \nYour score: ${humanScore} \nComputer score: ${computerScore}`;
                } else if (humanChoice === "paper" && computerChoice === "scissors") {
                    ++computerScore;
                    return `You lose! Scissors beats paper \nYour score: ${humanScore} \nComputer score: ${computerScore}`;
                } else if (humanChoice === "scissors" && computerChoice === "paper") {
                    ++humanScore;
                    return `You win! Scissors beats paper \nYour score: ${humanScore} \nComputer score: ${computerScore}`;
                } else if (humanChoice === "scissors" && computerChoice === "rock") {
                    ++computerScore;
                    return `You lose! Rock beats scissors \nYour score: ${humanScore} \nComputer score: ${computerScore}`;
                }
            }
            console.log(playRound());
            console.log(playRound());
            console.log(playRound());
            console.log(playRound());
            console.log(playRound());

            if (humanScore > computerScore) {
                return "You win the game!";
            } else if (humanScore === computerScore) {
                return "Tie game";
            } else {
                return "Better luck next time";
            }
        }

        console.log(playGame());
    </script>
</body>
</html>
